<!--기존로그인등페이지의디자인을재활용한다.-->
<section class="hero d-flex align-items-center
            justify-content-center text-center py-5">
    <div class="container" style="max-width: 500px;">
        <h2 class="fw-bold mb-4">내프로필</h2>

<!--프로필사진영역-->
<div class="mb-4">
    <imgid="profileImg"
        src="/uploads/profile/default.png"
        class="rounded-circle"
        width="120" height="120"
        style="object-fit:cover; border:3px solid #fff;"
        alt="프로필사진">
</div>

<!--개인정보출력-->
    <div class="card bg-dark text-white border-secondary mb-4">
        <div class="card-body text-start">
            <table class="table table-dark table-bordered mb-0">
            <tr>
    <thstyle="width:30%">아이디</th>
            <td id="infoUsername"></td>
        </tr>
        <tr>
            <th>이메일</th>
            <td id="infoEmail"></td>
        </tr>
        <tr>
            <th>연락처</th>
            <td id="infoPhone"></td>
        </tr>
    </table>
    </div>
    </div>

<!--사진업로드폼-->
    <form id="uploadForm"
        method="POST"
        action="/profile/upload"
        enctype="multipart/form-data">
    <div class="mb-3">

<label class="form-label">프로필사진변경</label>
    <input type="file"
        class="form-control"
        id="profileFile"
        name="profileImage"
        accept="image/jpeg,image/png,image/gif,image/webp">
    <div class="form-text text-muted">
        jpg, png, gif, webp/ 최대5MB
    </div>
</div>
<button type="submit"
        class="btnbtn-primary w-100">
    사진업로드
</button>
</form>
</div>
</section>

<!-- 사진 업로드 폼 아래에 추가 -->
<hr class="my-4">

<!-- 토글 버튼 -->
<button class="btn btn-warning w-100 mb-2"
    type="button"
    data-bs-toggle="collapse"
    data-bs-target="#updateFormArea"
    aria-expanded="false">
    개인정보 수정
</button>

<!-- 기본 숨김 → 버튼 클릭 시 펼쳐짐 -->
    <div class="collapse" id="updateFormArea">
        <div class="card card-body bg-dark
            text-white border-secondary mt-2">

<!-- 수정 결과 메시지 -->
<div id="updateMsg" class="alert d-none mb-3"></div>
<form id="updateForm"
    method="POST"
    action="/profile/update">

<div class="mb-3 text-start">
    <label class="form-label">이메일</label>
    <input type="text" class="form-control"
        id="updateEmail" name="email"
        placeholder="example@email.com">
    <div class="invalid-feedback" id="updateEmailMsg"></div>
</div>


<!--JS 연동-->
<script src="../js/search.js"></script>
<script src="../js/toggle.js"></script>
